<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="James Toetsweek Command Center: rustig en doelgericht leren voor de toetsweek."
    />
    <meta name="theme-color" content="#173f3a" />
    <title>James Toetsweek Command Center</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Ga naar de inhoud</a>

    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#/home" aria-label="Naar dashboard">
          <span class="brand-mark" aria-hidden="true">J</span>
          <span>
            <strong>Command Center</strong>
            <small>James' toetsweek</small>
          </span>
        </a>
        <div class="topbar-actions">
          <button class="icon-button install-button" id="install-button" type="button" hidden>
            Installeer
          </button>
          <a class="xp-pill" href="#/rewards" aria-label="Bekijk XP en beloningen">
            <span class="xp-dot" aria-hidden="true"></span>
            <strong id="xp-count">0</strong>
            <span>XP</span>
          </a>
        </div>
      </header>

      <main id="main-content" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="Hoofdnavigatie">
        <a href="#/home" data-nav="home">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10.5 12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5z" />
            <path d="M9 21v-7h6v7" />
          </svg>
          <span>Vandaag</span>
        </a>
        <a href="#/subjects" data-nav="subjects">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v17H6.5A2.5 2.5 0 0 0 4 21.5z" />
            <path d="M4 4.5v17M8 6h8M8 10h7" />
          </svg>
          <span>Vakken</span>
        </a>
        <a href="#/rewards" data-nav="rewards">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 3h8v4a4 4 0 0 1-8 0zM8 5H4v2a4 4 0 0 0 4 4M16 5h4v2a4 4 0 0 1-4 4" />
            <path d="M12 11v5M8 21h8M9 16h6v5H9z" />
          </svg>
          <span>Beloningen</span>
        </a>
      </nav>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="confetti" id="confetti" aria-hidden="true"></div>

    <dialog id="reset-dialog">
      <form method="dialog" class="dialog-card">
        <span class="eyebrow">Even checken</span>
        <h2>Voortgang opnieuw beginnen?</h2>
        <p>Alle XP, scores, badges en geleerde kaartjes worden van dit apparaat verwijderd.</p>
        <div class="dialog-actions">
          <button class="button button-ghost" value="cancel">Annuleren</button>
          <button class="button button-danger" value="confirm">Wis voortgang</button>
        </div>
      </form>
    </dialog>

    <noscript>
      <p class="noscript">JavaScript is nodig om de leerstanden te gebruiken.</p>
    </noscript>
    <script src="app.js" defer></script>
  </body>
</html>
